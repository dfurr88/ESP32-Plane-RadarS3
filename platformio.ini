; ESP32-S3 Mini + 1.28" round GC9A01 (240×240)
; Board in Arduino IDE: "ESP32S3 Dev Module"
; Set USB Mode to "USB-OTG (TinyUSB)" and USB CDC On Boot to "Enabled"

[env:s3mini]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 4MB
board_build.partitions = default.csv
board_build.embed_files = data/ui_font.vlw
extra_scripts = post:scripts/merge_firmware.py

; USB serial over USB-C (S3 Mini native USB via USB-OTG)
build_flags =
  -std=gnu++17
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_HAS_PSRAM=0
  -DWM_NODEBUG
  -DWM_MDNS

lib_deps =
  lovyan03/LovyanGFX@^1.2.7
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
